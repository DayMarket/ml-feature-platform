resources:
  path: ../../../../../config/spark/resources.yaml

spark:
  template_path: ../../../../../config/spark/layer_spark_application.yaml
  application_name: fetch-silver-product-search-queries
  main_application_file: local:///git/repo/layers/silver/product_id/product_search_queries/v1/entrypoints/get_product_search_queries.py
  resource_profile: large

table:
  key: product_search_queries
  catalog: iceberg
  schema: silver
  name: feature_platform_product_search_queries
  primary_key: date,product_id
  meta:
    team: team:search
    create_dbt_pr: false
    create_maintenance_pr: true

source:
  engine: spark_iceberg
  ranking_events_table: iceberg.silver.ranking_analytics_events
  sku_table: iceberg.silver.sku
  model_name: search_unified_model_v6
  lookback_days: 14
  top_queries_limit: 200
dag:
  id: feature-platform.layers.silver.product_id.product_search_queries
  group_tag: product-search-queries
  schedule: "0 3 * * *"
  start_date: "2026-06-29T00:00:00Z"
  team: search
  owner: team:search

alerts:
  team: search
  severity: P4
  oncall_webhook_conn_id: oncall_webhook_search
