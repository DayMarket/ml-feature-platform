kind: pipeline
name: Sync DAG with airflow-dags superrepo
trigger:
  branch:
    - master
    - dev
  event:
    - push

node:
  type: um-common

image_pull_secrets:
  - cr_pull_secret

volumes:
  - name: docker
    host:
      path: /var/run/docker.sock  

steps:
  - name: test step
    image: python:3.11-slim
    environment:
      SECRET:
        from_secret: SECRET
    commands:
      - echo "=== test step ==="
      - echo "repo=$DRONE_REPO branch=$DRONE_COMMIT_BRANCH event=$DRONE_BUILD_EVENT build=$DRONE_BUILD_NUMBER"
      - echo "commit=$DRONE_COMMIT_SHA"
      - python ci_test/test_script.py

  - name: run pyspark migrations
    image: ghcr.io/daymarket/spark:v3.5.5-scala2.12-java17-ubuntu-python3
    environment:
      S3_ACCESS_KEY:
        from_secret: S3_ACCESS_KEY
      S3_SECRET_KEY:
        from_secret: S3_SECRET_KEY
      HIVE_METASTORE_URIS:
        from_secret: HIVE_METASTORE_URIS
      ICEBERG_WAREHOUSE:
        from_secret: ICEBERG_WAREHOUSE
    commands:
      - echo "=== run pyspark migrations ==="
      - echo "repo=$DRONE_REPO branch=$DRONE_COMMIT_BRANCH event=$DRONE_BUILD_EVENT build=$DRONE_BUILD_NUMBER"
      - mkdir -p /tmp/.ivy2/cache /tmp/.ivy2/jars
      - /opt/spark/bin/spark-submit --conf spark.jars.ivy=/tmp/.ivy2 --packages org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.2,org.apache.iceberg:iceberg-aws-bundle:1.5.2 scripts/run_pyspark_migrations.py --repo-root .
    when:
      branch:
        - master
      event:
        - push

  - name: sync dbt source
    image: alpine:3.20
    environment:
      GIT_TOKEN:
        from_secret: ghmachine_token
      DBT_REPO_URL:
        from_secret: DBT_REPO_URL
    commands:
      - echo "=== sync dbt source ==="
      - echo "repo=$DRONE_REPO branch=$DRONE_COMMIT_BRANCH event=$DRONE_BUILD_EVENT build=$DRONE_BUILD_NUMBER"
      - echo "installing runtime dependencies"
      - apk add --no-cache git github-cli python3
      - git --version
      - gh --version
      - python3 --version
      - echo "running dbt source sync"
      - python3 scripts/sync_dbt_sources.py
      - if [ -f created_dbt_pr_url.txt ]; then echo "created dbt PR:"; cat created_dbt_pr_url.txt; fi

  - name: Update submodule reference to the latest state
    image: alpine/git:v2.26.2
    environment:
      PUSH_TOKEN:
        from_secret: dag_repo_pusher_ghmachine
    commands:
      - echo "=== sync airflow-dags submodule ==="
      - echo "repo=$DRONE_REPO branch=$DRONE_COMMIT_BRANCH event=$DRONE_BUILD_EVENT build=$DRONE_BUILD_NUMBER"
      - export DAG_FOLDER=$(basename $DRONE_REPO | tr '-' '_')
      - echo "dag_folder=$DAG_FOLDER"
      - git clone https://$$PUSH_TOKEN@github.com/DayMarket/airflow-dags.git
      - cd airflow-dags
      - git checkout $DRONE_COMMIT_BRANCH
      - git submodule update --recursive --remote --init dags/$DAG_FOLDER
      - git -C dags/$DAG_FOLDER pull origin $DRONE_COMMIT_BRANCH
      - git status --short
      - git commit --allow-empty -a -m "Updated $DAG_FOLDER ($DRONE_COMMIT_BRANCH) - $DRONE_COMMIT_MESSAGE"
      - git push https://$$PUSH_TOKEN@github.com/DayMarket/airflow-dags.git
---
kind: pipeline
name: Build pyspark docker image for sku group install silver stats

node:
  type: um-common
trigger:
  ref:
    - refs/tags/spark-silver-search-sku-group-install-stats-*

volumes:
  - name: m2-cache
    host:
      path: /tmp/m2-cache-new
  - name: docker
    host:
      path: /var/run/docker.sock

steps:
  - name: build and publish image
    image: plugins/docker
    settings:
      username: json_key
      registry: cr.yandex
      repo: cr.yandex/de-common/pyspark-silver-sku-group-query-statistics
      tags: ${DRONE_TAG}
      use_cache: true
      dockerfile: layers/silver/sku_group_install/v1/Dockerfile
      purge: false
      password:
        from_secret: de_common_cr_json_key
      build_args_from_env:
        - NEXUS_USERNAME
        - NEXUS_PASSWORD
    environment:
      NEXUS_USERNAME:
        from_secret: nexus_pypi_um_reader_username
      NEXUS_PASSWORD:
        from_secret: nexus_pypi_um_reader_password

    volumes:
      - name: docker
        path: /var/run/docker.sock
